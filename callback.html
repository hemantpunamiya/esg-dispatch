<!DOCTYPE html>
<html>
<head>
  <title>LinkedIn Auth — ESG Dispatch</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; max-width: 600px; margin: 80px auto; padding: 20px; background: #f0f4f1; text-align: center; }
    .box { background: white; border-radius: 14px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h2 { color: #15582e; margin-bottom: 10px; }
    .code { background: #f0f4f1; border: 2px solid #15582e; border-radius: 8px; padding: 16px; font-family: monospace; font-size: 0.85rem; word-break: break-all; margin: 20px 0; text-align: left; }
    .error { background: #fff0f0; border: 2px solid #dc2626; border-radius: 8px; padding: 16px; font-family: monospace; font-size: 0.85rem; word-break: break-all; margin: 20px 0; text-align: left; color: #dc2626; }
    p { color: #666; }
  </style>
</head>
<body>
  <div class="box" id="content">
    <h2>🔍 LinkedIn Auth Callback</h2>
    <p>All URL parameters received:</p>
    <div class="code" id="allparams">Loading...</div>
    <div id="result"></div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const all = {};
    for (const [k,v] of params.entries()) all[k] = v;
    document.getElementById('allparams').textContent = JSON.stringify(all, null, 2);

    const code = params.get('code');
    const error = params.get('error');
    const errorDesc = params.get('error_description');

    if (code) {
      document.getElementById('result').innerHTML =
        '<h2>✅ Success! Paste this code into Claude:</h2><div class="code">' + code + '</div>';
    } else if (error) {
      document.getElementById('result').innerHTML =
        '<div class="error"><strong>Error:</strong> ' + error + '<br><strong>Description:</strong> ' + (errorDesc||'none') + '</div><p>Screenshot this and share with Claude.</p>';
    }
  </script>
</body>
</html>
